name: Compile Full Standard Library

on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  DOTTY_CI_RUN: true

jobs:

  # Skip all downstream jobs on doc-only PRs.
  # Non-PR events (push, workflow_call) always run everything.
  changes:
    name: Detect source changes
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
      compiler: ${{ steps.filter.outputs.compiler }}
      library: ${{ steps.filter.outputs.library }}
      interfaces: ${{ steps.filter.outputs.interfaces }}
      tasty_core: ${{ steps.filter.outputs.tasty_core }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            FILES=$(git diff --name-only "$BASE" HEAD)

            echo "source=$(echo "$FILES" | grep -v '^$' | grep -qvE '^(docs/|changelogs/|.*\.md$)' && echo true || echo false)" >> "$GITHUB_OUTPUT"

            echo "compiler=$(echo "$FILES" | grep -qE '^(compiler/|project/|.*\.sbt$)' && echo true || echo false)" >> "$GITHUB_OUTPUT"
            echo "library=$(echo "$FILES" | grep -qE '^(library/|project/|.*\.sbt$)' && echo true || echo false)" >> "$GITHUB_OUTPUT"
            echo "interfaces=$(echo "$FILES" | grep -qE '^(interfaces/|project/|.*\.sbt$)' && echo true || echo false)" >> "$GITHUB_OUTPUT"
            echo "tasty_core=$(echo "$FILES" | grep -qE '^(tasty/|project/|.*\.sbt$)' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          else
            echo "source=true" >> "$GITHUB_OUTPUT"
            echo "compiler=true" >> "$GITHUB_OUTPUT"
            echo "library=true" >> "$GITHUB_OUTPUT"
            echo "interfaces=true" >> "$GITHUB_OUTPUT"
            echo "tasty_core=true" >> "$GITHUB_OUTPUT"
          fi

  test-scala-library-nonbootstrapped:
    name: Non-Bootstrapped Library Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - run: ./project/scripts/sbt "scala-library-nonbootstrapped/${{ github.event_name == 'pull_request' && 'validatePullRequest' || 'test' }}"

  test-scala-library-bootstrapped:
    name: Bootstrapped Library Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - run: ./project/scripts/sbt "scala-library-bootstrapped/${{ github.event_name == 'pull_request' && 'validatePullRequest' || 'test' }}"

  #################################################################################################
  ########################################### MiMa JOBS ###########################################
  #################################################################################################

  mima-scala-library-nonbootstrapped:
    runs-on: ubuntu-latest
    if: false
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1
      - name: Report MiMa issues in `scala-library-nonbootstrapped`
        run: ./project/scripts/sbt scala-library-nonbootstrapped/mimaReportBinaryIssues

  mima-scala3-interfaces:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.interfaces == 'true'
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1
      - name: Report MiMa issues in `scala3-interfaces`
        run: ./project/scripts/sbt scala3-interfaces/mimaReportBinaryIssues

  mima-tasty-core-nonbootstrapped:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.tasty_core == 'true'
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1
      - name: Report MiMa issues in `tasty-core-nonbootstrapped`
        run: ./project/scripts/sbt tasty-core-nonbootstrapped/mimaReportBinaryIssues

  static-analysis-scala-library-bootstrapped:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.library == 'true'
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1
      - name: Report MiMa issues in `scala-library-bootstrapped`
        run: ./project/scripts/sbt scala-library-bootstrapped/mimaReportBinaryIssues

      - name: Report missingLink checks
        run: ./project/scripts/sbt scala-library-bootstrapped/missinglinkCheck

  mima-tasty-core-bootstrapped:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.tasty_core == 'true'
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1
      - name: Report MiMa issues in `tasty-core-bootstrapped`
        run: ./project/scripts/sbt tasty-core-bootstrapped/mimaReportBinaryIssues

  mima-scala-library-sjs:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.library == 'true'
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1
      - name: Report MiMa issues in `scala-library-sjs`
        run: ./project/scripts/sbt scala-library-sjs/mimaReportBinaryIssues

  #################################################################################################
  ########################################### TEST JOBS ###########################################
  #################################################################################################

  test-scala3-compiler-nonbootstrapped:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.source == 'true'
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1

      - name: Test `scala3-compiler-nonbootstrapped`
        run: ./project/scripts/sbt "scala3-compiler-nonbootstrapped/${{ github.event_name == 'pull_request' && 'validatePullRequest' || 'test' }}"

      - name: Cmd Tests
        if: needs.changes.outputs.compiler == 'true'
        run: |
          ./project/scripts/sbt scala3-nonbootstrapped/publishLocal
          ./project/scripts/cmdTests

  test-scala3-compiler-bootstrapped:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.source == 'true'
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1

      - name: Test `scala3-compiler-bootstrapped`
        run: ./project/scripts/sbt "scala3-compiler-bootstrapped/${{ github.event_name == 'pull_request' && 'validatePullRequest' || 'test' }}"

      - name: Cmd Tests
        if: needs.changes.outputs.compiler == 'true'
        run: |
          ./project/scripts/sbt scala3-bootstrapped/publishLocal
          ./project/scripts/bootstrappedOnlyCmdTests

  test-scala3-bootstrapped-compilation-coverage:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.compiler == 'true'
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - name: Run `scala3-bootstrapped/testCompilation --enable-coverage-phase`
        run: ./project/scripts/sbt "scala3-bootstrapped/testCompilation --enable-coverage-phase"

  test-scala3-sbt-bridge-nonbootstrapped:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.source == 'true'
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - name: Test `scala3-sbt-bridge-nonbootstrapped`
        run: ./project/scripts/sbt "scala3-sbt-bridge-nonbootstrapped/${{ github.event_name == 'pull_request' && 'validatePullRequest' || 'test' }}"

  test-scala3-sbt-bridge-bootstrapped:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.source == 'true'
    steps:
      - name: Git Checkout
