      - uses: sbt/setup-sbt@v1
      - name: Test Language Server
        run: ./project/scripts/sbt "scala3-language-server/${{ github.event_name == 'pull_request' && 'validatePullRequest' || 'test' }}"

  scripted-tests:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.source == 'true'
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - name: Run SBT scripted tests
        run: ./project/scripts/sbt scala3-bootstrapped/scripted

  community_build_a:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.source == 'true'
    steps:
      - name: Checkout cleanup script
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - name: Run Community Build A
        run: |
          ./project/scripts/sbt "community-build/testOnly dotty.communitybuild.CommunityBuildTestA"

  community_build_b:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.source == 'true'
    steps:
      - name: Checkout cleanup script
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - name: Run Community Build B
        run: |
          ./project/scripts/sbt "community-build/testOnly dotty.communitybuild.CommunityBuildTestB"


  community_build_c:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.source == 'true'
    steps:
      - name: Checkout cleanup script
        uses: actions/checkout@v6
