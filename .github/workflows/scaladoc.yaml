name: scaladoc

on:
  push:
    branches-ignore:
      - 'language-reference-stable'
      - 'gh-readonly-queue/**'
  pull_request:
    branches-ignore:
      - 'language-reference-stable'
  merge_group:
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    if: "github.event_name == 'merge_group'
         || (    github.event_name == 'pull_request'
           && !contains(github.event.pull_request.body, '[skip ci]')
           && !contains(github.event.pull_request.body, '[skip docs]')
         )
         || contains(github.event.ref, 'scaladoc')
         || contains(github.event.ref, 'main')"

    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1
      - name: Compile and test scala3doc-js
        run: ./project/scripts/sbt scaladoc-js-main/test

      - name: Compile and test
        run: |
          ./project/scripts/sbt scaladoc/test
          # TODO: invalid interpolation of inherited @define #24963
          # ./project/scripts/sbt dist/Universal/stage
          # ./project/scripts/cmdScaladocTests

      - name: Locally publish self
        run: ./project/scripts/sbt scaladoc/publishLocal

      - name: Generate self documentation
        run: ./project/scripts/sbt scaladoc/generateSelfDocumentation

      - name: Generate testcases documentation
        run: ./project/scripts/sbt scaladoc/generateTestcasesDocumentation

      - name: Generate reference documentation
        run: ./project/scripts/sbt scaladoc/generateReferenceDocumentation

      - name: Generate Scala 3 documentation
        run: ./project/scripts/sbt scaladoc/generateScalaDocumentation

      - name: Upload scaladoc output
        uses: actions/upload-artifact@v4
        with:
          name: scaladoc-output
          path: |
            scaladoc/output/scala3

  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - uses: coursier/cache-action@v8
      - uses: VirtusLab/scala-cli-setup@v1.12.2

      - name: Validate docs sidebars
        run: scala-cli ./project/scripts/checkSidebarDocs.scala

  validate-generated-docs:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - name: Download scaladoc output
        uses: actions/download-artifact@v4
        with:
          name: scaladoc-output

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install html-proofer
        run: gem install html-proofer

     # Full tree except api/scala/** (top-level api/*.html only; 60k+ refs in subdirs)
     # ignore-urls: slash-delimited = regex (required to match all blob/... URLs); plain string = exact match only
     # ignore-files: regexes for paths to skip (api/scala subdirs; blog posts before 2022-01-01)
      - name: Validate documentation links
        run: |
          IGNORE_URLS='/^http:\/\/localhost:8080\//'
          # Font hosts (root URL returns 404; protocol-relative flagged by htmlproofer)
          IGNORE_URLS="${IGNORE_URLS},/fonts.gstatic.com/"
          IGNORE_URLS="${IGNORE_URLS},/fonts.googleapis.com/"
          IGNORE_URLS="${IGNORE_URLS},/dottydoc.css/"
          # Leads to rate limiting errors
          IGNORE_URLS="${IGNORE_URLS},/github.com/"
          # External sites that return 403/404 or change paths (redirects, moved pages)
          IGNORE_URLS="${IGNORE_URLS},/dl.acm.org/"
          # nightlyOf links to potentially not yet exisitng pages
          IGNORE_URLS="${IGNORE_URLS},/docs.scala-lang.org\/scala3\/reference\//"

          # Takes to much time (~30 minutes) to validate all subdirs in api/scala, only package scala is checked instead.
          IGNORE_FILES='/api\/scala\/[^/]+\//'
          # Cannot guarantee a stablity of links for old blog posts
          IGNORE_FILES="${IGNORE_FILES},/blog\/(201[5-9]|202[0-4])\//"
          IGNORE_FILES="${IGNORE_FILES},/release-notes-0.1.2.html/"
          IGNORE_FILES="${IGNORE_FILES},/docs\/release-notes\//"
          IGNORE_FILES="${IGNORE_FILES},/release-notes-0.1.2.html/"

          htmlproofer scaladoc/output/scala3 \
            --checks "Links" \
            --allow-hash-href \
            --allow-missing-href \
            --no-check-external-hash \
            --no-check-internal-hash \
            --no-enforce-https \
            --ignore-urls "$IGNORE_URLS" \
            --ignore-files "$IGNORE_FILES" \
            --log-level :debug


  stdlib-sourcelinks-test:
    runs-on: ubuntu-latest
    # if false - disable flaky test
    if: "false && ((    github.event_name == 'pull_request'
           && !contains(github.event.pull_request.body, '[skip ci]')
           && !contains(github.event.pull_request.body, '[skip docs]')
         )
         || contains(github.event.ref, 'scaladoc')
         || contains(github.event.ref, 'scala3doc')
         || contains(github.event.ref, 'main'))"

    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Test sourcelinks to stdlib
        run: true # ./project/scripts/sbt scaladoc/sourceLinksIntegrationTest:test
