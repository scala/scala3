name: Specification

on:
  push:
    tags:
      - '*'
    branches-ignore:
      - 'gh-readonly-queue/**'
  pull_request:
  merge_group:
  workflow_dispatch:

env:
  DOTTY_CI_RUN: true

jobs:

  # Gate on docs/_spec/ changes so PRs that don't touch the spec skip this workflow.
  # Non-PR events (push, workflow_dispatch, merge_group) always run.
  changes:
    name: Detect spec changes
    runs-on: ubuntu-latest
    outputs:
      spec: ${{ steps.filter.outputs.spec }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            FILES=$(git diff --name-only "$BASE" HEAD)
            echo "spec=$(echo "$FILES" | grep -qE '^(docs/_spec/|project/|.*\.sbt$)' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          else
            echo "spec=true" >> "$GITHUB_OUTPUT"
          fi

  specification:
    needs: changes
    runs-on: ubuntu-latest
    if: |
      (github.event_name != 'pull_request' || needs.changes.outputs.spec == 'true') &&
      ((github.event_name == 'pull_request' && !contains(github.event.pull_request.body, '[skip ci]')) ||
       (github.event_name == 'workflow_dispatch' && github.repository == 'scala/scala3') ||
       github.event_name == 'push' ||
       github.event_name == 'merge_group')
    defaults:
      run:
        working-directory: ./docs/_spec

    steps:
      - uses: actions/checkout@v6

      # Keep in sync with ./docs/_spec/Dockerfile
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7'
      - name: Install required gems
        run: |
          gem install "rubygems-update:<3.5" --no-document
          update_rubygems
          gem install sass-embedded -v 1.58.0
          gem install bundler:1.17.2 jekyll
          bundle install
          npm install bower

      - name: Build the specification
        run: |
          bundle exec jekyll build

      # Deploy
      - name: Deployment
        env:
          USER_FOR_TEST: ${{ secrets.SPEC_DEPLOY_USER }}
        if: ${{ env.USER_FOR_TEST != '' }}
        uses: burnett01/rsync-deployments@8.0.5
        with:
          switches: -rzv
          path: docs/_spec/_site/
          remote_path: ${{ secrets.SPEC_DEPLOY_PATH }}
          remote_host: ${{ secrets.SPEC_DEPLOY_HOST }}
          remote_user: ${{ secrets.SPEC_DEPLOY_USER }}
          remote_key: ${{ secrets.SPEC_DEPLOY_KEY }}
          remote_key_pass: ${{ secrets.SPEC_DEPLOY_PASS }}
